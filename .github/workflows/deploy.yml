name: Deploy Evidence Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: visualization/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: visualization

      - name: Set base path for GitHub Pages
        run: |
          python3 -c "
import yaml, os
with open('evidence.config.yaml', 'r') as f:
    c = yaml.safe_load(f)
c.setdefault('deployment', {})['basePath'] = '/' + os.environ['REPO_NAME']
with open('evidence.config.yaml', 'w') as f:
    yaml.dump(c, f, default_flow_style=False)
"
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        working-directory: visualization

      - name: Process data sources
        run: npm run sources
        working-directory: visualization

      - name: Build Evidence site
        run: npm run build
        working-directory: visualization

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: visualization/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
